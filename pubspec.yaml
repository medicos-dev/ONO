name: ono
description: "ONO - Multiplayer UNO Card Game"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  supabase_flutter: ^2.5.0
  flutter_dotenv: ^5.1.0
  wakelock_plus: ^1.2.5
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2




flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/ONO APP LOGO.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/ONO APP LOGO.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - .env

  fonts:
    - family: SourGummy
      fonts:
        - asset: assets/SourGummy-Medium.ttf
          weight: 500
